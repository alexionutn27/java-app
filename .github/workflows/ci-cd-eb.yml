name: ci-cd-eb

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  EB_APP: ${{ vars.EB_APP }}
  EB_ENV: ${{ vars.EB_ENV }}
  AWS_REGION: ${{ secrets.AWS_REGION }}

jobs:
  build_test_package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
      - name: Build and test
        run: mvn -B -ntp clean verify
      - name: Create EB bundle
        run: |
          JAR_FILE=$(ls target/*.jar | head -n1)
          cp "$JAR_FILE" application.jar
          zip -r bundle.zip Procfile application.jar
      - uses: actions/upload-artifact@v4
        with:
          name: eb-bundle
          path: bundle.zip

  deploy:
    needs: build_test_package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: eb-bundle
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Deploy to Elastic Beanstalk
        uses: einaregilsson/beanstalk-deploy@v21
        with:
          aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          application_name: ${{ env.EB_APP }}
          environment_name: ${{ env.EB_ENV }}
          version_label: ${{ github.sha }}
          region: ${{ env.AWS_REGION }}
          deployment_package: bundle.zip
          use_existing_version_if_available: true