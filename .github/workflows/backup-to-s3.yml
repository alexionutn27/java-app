name: backup-to-s3

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"
jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create archive
        run: |
          mkdir -p backup
          tar -czf backup/project-${{ github.run_number }}.tar.gz .

      - name: Upload archive to S3
        run: aws s3 cp backup/ s3://${{ secrets.BACKUP_BUCKET }}/ --recursive

      - name: Verify upload
        run: aws s3 ls s3://${{ secrets.BACKUP_BUCKET }}/ | tail -n 5