<!doctype html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SkillBrain Java App</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
<main class="container">
    <section class="hero card">
        <p class="badge">Modul 4 • Continuous Delivery & Deployment</p>
        <h1>SkillBrain Java App</h1>
        <p class="lead">
            Aceasta este aplicația pe care o folosești pe tot parcursul laboratorului:
            build, test, publish, deploy și backup.
        </p>
    </section>

    <section class="grid">
        <article class="card">
            <h2>Health</h2>
            <p id="health-status" class="muted">Se încarcă...</p>
        </article>
        <article class="card">
            <h2>Info</h2>
            <p id="app-info" class="muted">Se încarcă...</p>
        </article>
    </section>

    <section class="card">
        <h2>Pipeline flow</h2>
        <ol id="pipeline-list" class="pipeline"></ol>
    </section>
</main>
<script src="/app.js"></script>
</body>
</html>
